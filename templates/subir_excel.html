{% extends "base.html" %}

{% block title %}{{ t["upload_excel_title"] }} - {{ t["app_title"] }}{% endblock %}

{% block content %}
<div class="main-content">
    <div class="header-section">
        <h2><i class="fas fa-file-invoice-dollar"></i> {{ t["upload_excel_header"] }}</h2>
        <a href="{{ url_for('reportes') }}" class="btn-view">
            <i class="fas fa-arrow-left"></i> {{ t["btn_back_to_reports"] }}
        </a>
    </div>

    <div class="table-container">
        <p>{{ t["upload_instructions"] }}: <strong>cedula</strong> {{ t["and_label"] }} <strong>lectura_final</strong>.</p>
        <br>

        <form action="{{ url_for('subir_excel') }}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>{{ t["label_select_file"] }}:</label>
                <input type="file" name="archivo_excel" accept=".xlsx, .xls" required>
            </div>
            <br>
            <button type="submit" class="btn-submit">
                <i class="fas fa-sync"></i> {{ t["btn_process_readings"] }}
            </button>
        </form>
    </div>
</div>
{% endblock %}
